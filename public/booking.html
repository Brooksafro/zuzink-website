<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ZuzInk | Book Appointment</title>

<!-- Fonts -->

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- Icons -->

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<!-- FullCalendar -->

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.css">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.js"></script>

<!-- Styles -->

<link
rel="stylesheet"
href="css/booking.css">

</head>

<body>

<header class="bookingHeader">

<a href="/" class="logo">

ZUZINK

</a>

<div class="languageSwitcher">

<img

id="englishButton"

src="images/uk.png"

alt="English"

title="English"

>

<img

id="bulgarianButton"

src="images/bg.png"

alt="Български"

title="Български"

>

</div>

</header>

<section class="bookingSection">

<div class="bookingContainer">

<!-- ==========================================
LEFT SIDE
========================================== -->

<div class="calendarSide">

<h2 data-i18n="chooseDate">

Choose Appointment Date

</h2>

<div id="calendar"></div>

<div class="bookingTips">

<h3 data-i18n="tipsTitle">

Before Your Appointment

</h3>

<ul>

<li data-i18n="tip1">

Eat before arriving.

</li>

<li data-i18n="tip2">

Stay hydrated.

</li>

<li data-i18n="tip3">

Bring reference images.

</li>

<li data-i18n="tip4">

Arrive 10 minutes early.

</li>

</ul>

</div>

</div>

<!-- ==========================================
RIGHT SIDE
========================================== -->

<div class="formSide">

<h1 data-i18n="bookTitle">

Book Tattoo Session

</h1>

<form

id="bookingForm"

enctype="multipart/form-data"

autocomplete="off"

>

<input

type="text"

id="name"

placeholder="Name"

data-i18n-placeholder="name"

required

>

<input

type="email"

id="email"

placeholder="Email"

data-i18n-placeholder="email"

required

>

<input

type="tel"

id="phone"

placeholder="Phone"

data-i18n-placeholder="phone"

required

>

<select

id="tattooType"

required>

<option

value=""

data-i18n="size">

Tattoo Size

</option>

</select>

<select

id="placement"

required>

<option

value=""

data-i18n="placement">

Placement

</option>

</select>

<select

id="style"

required>

<option

value=""

data-i18n="style">

Tattoo Style

</option>

</select>

<input

type="text"

id="selectedDate"

readonly

placeholder="Select a date from the calendar"

data-i18n-placeholder="selectedDate"

>

<select

id="time"

required>

<option

value=""

data-i18n="selectTime">

Select Time

</option>

</select>

<label

for="referenceImages"

class="uploadLabel"

data-i18n="referenceImages"

>

Reference Images

</label>

<input

type="file"

id="referenceImages"

accept="image/*"

multiple

>

<div

id="preview"

class="imagePreview"

></div>

<textarea

id="notes"

rows="5"

placeholder="Describe your tattoo idea..."

data-i18n-placeholder="notes"

></textarea>

<button

type="submit"

id="confirmButton"

class="bookButton"

data-i18n="confirmBooking"

>

Confirm Booking

</button>

<div

id="bookingMessage"

class="bookingMessage"

></div>

</form>

</div>

</div>

</section>

<!-- ==========================================
SCRIPTS
========================================== -->

<script src="js/translations.js"></script>

<script src="js/site.js"></script>

<script src="js/booking.js"></script>

</body>

</html>
