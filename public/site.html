<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZuzInk Tattoo Studio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    color:white;

    background:
    linear-gradient(
        rgba(0,0,0,.60),
        rgba(0,0,0,.60)
    ),
    url("images/background.jpg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* FLAGS */

.languages{
    position:absolute;
    top:30px;
    left:30px;
    display:flex;
    gap:15px;
    z-index:100;
}

.languages img{
    width:45px;
    height:30px;
    cursor:pointer;
    border-radius:5px;
    transition:.3s;
    box-shadow:0 3px 10px rgba(0,0,0,.4);
}

.languages img:hover{
    transform:scale(1.1);
}

/* CONTACTS */

.contacts{
    position:absolute;
    top:30px;
    right:40px;
    text-align:right;
    z-index:100;
}

.contacts p,
.contacts a{
    display:block;
    color:white;
    text-decoration:none;
    font-size:20px;
    margin-bottom:12px;
    text-shadow:0 3px 10px rgba(0,0,0,.5);
}

.contacts a:hover{
    color:#ddd;
}

/* CENTER */

.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.logo{
    width:260px;
    margin-bottom:20px;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,.5));
}

.title{
    font-size:70px;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:0 5px 15px rgba(0,0,0,.6);
}

.address{
    font-size:25px;
    cursor:pointer;
    display:inline-block;
    position:relative;
    text-shadow:0 3px 10px rgba(0,0,0,.6);
}

/* MAP */

.map-popup{
    display:none;
    position:absolute;
    top:50px;
    left:50%;
    transform:translateX(-50%);

    width:350px;
    height:250px;

    background:white;
    border-radius:20px;
    overflow:hidden;

    box-shadow:0 15px 40px rgba(0,0,0,.6);
    z-index:1000;
}

.map-popup iframe{
    width:100%;
    height:100%;
    border:none;
}

/* BUTTON */

.book-btn{
    position:absolute;
    right:60px;
    bottom:60px;

    background:#800020;
    color:white;

    border:none;
    padding:20px 45px;

    border-radius:50px;

    font-size:28px;
    font-weight:bold;

    cursor:pointer;
    transition:.3s;

    box-shadow:
        0 0 25px rgba(128,0,32,.6);
}

.book-btn:hover{
    transform:translateY(-4px);
    background:#990026;
}

/* BOOKING PANEL */

#bookingPanel{
    position:fixed;
    left:50%;
    bottom:-100%;
    transform:translateX(-50%);

    width:95%;
    height:85vh;

    background:white;

    border-radius:35px 35px 0 0;

    overflow:hidden;

    box-shadow:
        0 -15px 40px rgba(0,0,0,.6);

    transition:.6s ease;

    z-index:9999;
}

#bookingPanel.active{
    bottom:0;
}

.panel-header{
    height:70px;
    background:#111827;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 30px;
}

.panel-header h2{
    font-size:28px;
}

.panel-header button{
    background:none;
    border:none;
    color:white;
    font-size:35px;
    cursor:pointer;
}

#bookingPanel iframe{
    width:100%;
    height:calc(100% - 70px);
    border:none;
}

/* MOBILE */

@media(max-width:900px){

    .logo{
        width:180px;
    }

    .title{
        font-size:45px;
    }

    .contacts{
        right:20px;
    }

    .book-btn{
        right:20px;
        bottom:20px;
        font-size:22px;
        padding:15px 30px;
    }

    .map-popup{
        width:300px;
        height:200px;
    }
}

</style>
</head>
<body>

<!-- FLAGS -->

<div class="languages">
    <img src="images/uk.png" id="englishBtn">
    <img src="images/bg.png" id="bulgarianBtn">
</div>

<!-- CONTACTS -->

<div class="contacts">

    <p id="phoneText">
        📞 +359 89 202 0065
    </p>

    <a href="mailto:brooksafro@abv.bg">
        <span id="emailText">
            ✉️ brooksafro@abv.bg
        </span>
    </a>

    <a
        href="https://www.instagram.com/zuz1nk/"
        target="_blank">

        <span id="instagramText">
            📷 @zuz1nk
        </span>

    </a>

</div>

<!-- CENTER -->

<div class="center">

    <img
        src="images/logo.png"
        class="logo"
        alt="Logo">

    <div class="title" id="titleText">
        ZuzInk
    </div>

    <div
        class="address"
        id="addressBtn">

        <span id="addressText">
            📍 Bulgarovo, ul. Dimcho Debelyanov 4
        </span>

        <div
            class="map-popup"
            id="mapPopup">

            <iframe
                src="https://maps.google.com/maps?q=Bulgarovo%20ul%20Dimcho%20Debelyanov%204&t=&z=16&ie=UTF8&iwloc=&output=embed">
            </iframe>

        </div>

    </div>

</div>

<!-- BOOK BUTTON -->

<button
    class="book-btn"
    id="openBooking">

    <span id="bookText">
        Book Online
    </span>

</button>

<!-- BOOKING PANEL -->

<div id="bookingPanel">

    <div class="panel-header">

        <h2 id="popupTitle">
            Book Online
        </h2>

        <button id="closeBooking">
            ✕
        </button>

    </div>

    <iframe src="booking.html"></iframe>

</div>

<script>

/* TRANSLATIONS */

const translations = {

    en: {
        title: "ZuzInk",
        address:
            "📍 Bulgarovo, ul. Dimcho Debelyanov 4",
        phone:
            "📞 +359 89 202 0065",
        email:
            "✉️ brooksafro@abv.bg",
        instagram:
            "📷 @zuz1nk",
        book:
            "Book Online",
        popup:
            "Book Online"
    },

    bg: {
        title: "ZuzInk",
        address:
            "📍 Българово, ул. Димчо Дебелянов 4",
        phone:
            "📞 +359 89 202 0065",
        email:
            "✉️ brooksafro@abv.bg",
        instagram:
            "📷 @zuz1nk",
        book:
            "Запази час",
        popup:
            "Запази час"
    }
};

function changeLanguage(lang){

    document.getElementById(
        "titleText"
    ).innerText =
        translations[lang].title;

    document.getElementById(
        "addressText"
    ).innerText =
        translations[lang].address;

    document.getElementById(
        "phoneText"
    ).innerText =
        translations[lang].phone;

    document.getElementById(
        "emailText"
    ).innerText =
        translations[lang].email;

    document.getElementById(
        "instagramText"
    ).innerText =
        translations[lang].instagram;

    document.getElementById(
        "bookText"
    ).innerText =
        translations[lang].book;

    document.getElementById(
        "popupTitle"
    ).innerText =
        translations[lang].popup;

    localStorage.setItem(
        "language",
        lang
    );
}

document
.getElementById("englishBtn")
.addEventListener(
"click",
() => changeLanguage("en")
);

document
.getElementById("bulgarianBtn")
.addEventListener(
"click",
() => changeLanguage("bg")
);

const saved =
    localStorage.getItem(
        "language"
    ) || "en";

changeLanguage(saved);

/* MAP */

const address =
document.getElementById(
    "addressBtn"
);

const map =
document.getElementById(
    "mapPopup"
);

address.addEventListener(
"click",
() => {

    if (
        map.style.display ===
        "block"
    ) {
        map.style.display =
        "none";
    }
    else {
        map.style.display =
        "block";
    }

});

/* BOOKING PANEL */

const bookingPanel =
document.getElementById(
    "bookingPanel"
);

document
.getElementById(
    "openBooking"
)
.addEventListener(
"click",
() => {

    bookingPanel.classList.add(
        "active"
    );

});

document
.getElementById(
    "closeBooking"
)
.addEventListener(
"click",
() => {

    bookingPanel.classList.remove(
        "active"
    );

});

</script>

</body>
</html>
